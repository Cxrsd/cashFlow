meta:
  environment: python
  toolchain:
    name: pip
    version: 3.12

run:
  # отдельной build-фазы под миграции нет, поэтому все на старте
  command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && (python manage.py createsuperuser --noinput || true) && gunicorn config.wsgi:application --bind 0.0.0.0:80"
  persistenceMount: /data
  containerPort: 80
